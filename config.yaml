external_sites:
  - name: "skolverket"
    base_url: "https://www.skolverket.se"
    discovery: "sitemap"
    sitemaps:
      - "https://www.skolverket.se/sitemapindex.xml"
    document_extensions:
      - ".pdf"
      - ".docx"
      - ".doc"
      - ".pptx"
    skip_extensions:
      - ".png"
      - ".jpg"
      - ".jpeg"
      - ".gif"
      - ".webp"
      - ".svg"
      - ".zip"
      - ".xlsx"
      - ".xls"
      - ".xlsm"
      - ".srt"
    exclude_patterns:
      - "^https://www\\.skolverket\\.se/images/"
    max_concurrent: 5
    delay_between_requests: 0.5
    js_rendering: false
    user_agent: "FalkenbergKommun-RAG-Bot/1.0"
    ocr: false

  - name: "vardhandboken"
    base_url: "https://www.vardhandboken.se"
    discovery: "sitemap"
    sitemaps:
      - "https://www.vardhandboken.se/sitemap.xml"
    document_extensions:
      - ".pdf"
      - ".docx"
      - ".pptx"
    skip_extensions:
      - ".png"
      - ".jpg"
      - ".jpeg"
      - ".gif"
      - ".webp"
      - ".svg"
    exclude_patterns:
      - "^https://www\\.vardhandboken\\.se/episerver/"
    max_concurrent: 2
    delay_between_requests: 2.0
    js_rendering: false
    user_agent: "FalkenbergKommun-RAG-Bot/1.0"
    ocr: false
    discover_linked_documents: true
